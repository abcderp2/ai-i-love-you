name: Static quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: static-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: Validate checker syntax
        run: python3 -m py_compile scripts/check_site.py

      - name: Run dependency-free checks
        run: python3 scripts/check_site.py
