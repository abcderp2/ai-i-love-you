name: Static quality

on:
  pull_request:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: static-quality-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  static-quality:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Validate checker syntax
        run: python3 -m py_compile scripts/check_site.py

      - name: Run dependency-free checks
        run: python3 scripts/check_site.py
